<form id="testForm">
  <input type="email" name="email" placeholder="Email" required><br>
  <input type="text" name="steamid" placeholder="SteamID64" required><br>
  <input type="text" name="discord" placeholder="Discord" required><br>
  <label><input type="checkbox" name="confirm" required> Confirm info</label><br>
  <button type="submit">Send</button>
</form>
<p id="msg"></p>

<script>
const WORKER_URL = "proximiter-test.peter-proximiter.workers.dev";
const form = document.getElementById('testForm');
const msg = document.getElementById('msg');

form.addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(form);
  const data = {
    email: formData.get('email'),
    steamid: formData.get('steamid'),
    discord: formData.get('discord'),
    confirm: formData.get('confirm') ? true : false
  };

  if (!/^7656119\d{10}$/.test(data.steamid)) {
    msg.style.color = '#ff4d4d';
    msg.textContent = "Invalid SteamID64!";
    return;
  }

  try {
    const res = await fetch(WORKER_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    const json = await res.json();
    msg.style.color = json.success ? '#4fff4f' : '#ff4d4d';
    msg.textContent = json.success ? "Form submitted!" : json.error;
    if(json.success) form.reset();
  } catch(err) {
    msg.style.color = '#ff4d4d';
    msg.textContent = "Failed to submit form.";
  }
});
</script>
